<div class="rounded-lg bg-card text-card-foreground border-0 shadow-lg">
  <div class="p-6 pt-6">
    <div class="flex mb-4">

      @for (star of [].constructor(testimonial()?.stars); track $index){
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-star h-5 w-5 text-yellow-400 fill-current">
          <path
            d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z">
          </path>
        </svg>
      }
    </div>
    <p class="text-slate-700 mb-4 italic">{{ testimonial()?.description }}</p>
    <div>
      <div class="font-semibold text-slate-900">{{testimonial()?.writtenBy}}</div>
      <div class="text-slate-600">{{testimonial()?.jobTitle}}</div>
    </div>
  </div>
</div>
