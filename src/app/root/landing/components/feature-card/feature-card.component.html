<div class="">
  <div class="flex flex-col space-y-1.5 p-6">
    <div class="w-12 h-12 bg-slate-100 rounded-lg flex items-center justify-center mb-4">
      <img [src]="feature()?.icon" alt="Feature Icon" class="w-8 h-8 text-white" />
    </div>
    <h3 class="font-semibold tracking-tight text-xl">
      {{ feature()?.title }}
    </h3>
  </div>
  <div class="p-6 pt-0">
    <p class="text-muted-foreground text-base">
      {{ feature()?.description }}
    </p>
  </div>
</div>
