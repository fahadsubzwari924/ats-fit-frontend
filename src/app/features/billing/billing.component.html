<div class="pt-24 pb-16 px-4">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-12">
      <div class="flex items-center justify-center mb-6">
        <div
          class="w-16 h-16 bg-gradient-to-br from-blue-500 to-cyan-500 rounded-2xl flex items-center justify-center shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-credit-card h-8 w-8 text-white">
            <rect width="20" height="14" x="2" y="5" rx="2"></rect>
            <line x1="2" x2="22" y1="10" y2="10"></line>
          </svg>
        </div>
      </div>
      <h1
        class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-slate-900 via-blue-900 to-indigo-900 bg-clip-text text-transparent mb-4">
        Billing &amp; Subscription</h1>
      <p class="text-xl text-slate-600 max-w-2xl mx-auto">Manage your subscription, view usage, and billing history</p>
    </div>
    <div dir="ltr" data-orientation="horizontal" class="w-full">
      <div class="flex justify-center mb-8">
        <div role="tablist" aria-orientation="horizontal"
          class="h-10 items-center justify-center bg-muted text-muted-foreground grid w-full max-w-lg grid-cols-3 bg-gradient-to-r from-blue-600 to-indigo-600 p-1 rounded-2xl shadow-xl"
          tabindex="0" data-orientation="horizontal" style="outline: none;">
          <button type="button" role="tab" (click)="setActiveTab(BillingTab.OVERVIEW)" aria-selected="true" aria-controls="radix-:r6:-content-overview"
            [attr.data-state]="activeTab() === BillingTab.OVERVIEW ? 'active' : 'inactive'" id="radix-:r6:-trigger-overview"
            class="justify-center whitespace-nowrap px-3 py-1.5 text-sm font-medium ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 flex items-center gap-2 data-[state=active]:bg-white data-[state=active]:text-blue-600 data-[state=active]:shadow-lg text-white/80 hover:text-white transition-all rounded-xl cursor-pointer"
            tabindex="-1" data-orientation="horizontal" data-radix-collection-item="">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-chart-column h-4 w-4">
              <path d="M3 3v16a2 2 0 0 0 2 2h16"></path>
              <path d="M18 17V9"></path>
              <path d="M13 17V5"></path>
              <path d="M8 17v-3"></path>
            </svg>
            <span class="hidden sm:inline">Overview</span>
          </button>
          <button type="button" role="tab" (click)="setActiveTab(BillingTab.PAYMENT)" aria-selected="false" aria-controls="radix-:r6:-content-payment-methods"
            [attr.data-state]="activeTab() === BillingTab.PAYMENT ? 'active' : 'inactive'" id="radix-:r6:-trigger-payment-methods"
            class="justify-center whitespace-nowrap px-3 py-1.5 text-sm font-medium ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 flex items-center gap-2 data-[state=active]:bg-white data-[state=active]:text-blue-600 data-[state=active]:shadow-lg text-white/80 hover:text-white transition-all rounded-xl cursor-pointer"
            tabindex="-1" data-orientation="horizontal" data-radix-collection-item="">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-credit-card h-4 w-4">
              <rect width="20" height="14" x="2" y="5" rx="2"></rect>
              <line x1="2" x2="22" y1="10" y2="10"></line>
            </svg>
            <span class="hidden sm:inline">Payment</span>
          </button>
          <button type="button" role="tab" (click)="setActiveTab(BillingTab.HISTORY)" aria-selected="false" aria-controls="radix-:r6:-content-billing-history"
            [attr.data-state]="activeTab() === BillingTab.HISTORY ? 'active' : 'inactive'" id="radix-:r6:-trigger-billing-history"
            class="justify-center whitespace-nowrap px-3 py-1.5 text-sm font-medium ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 flex items-center gap-2 data-[state=active]:bg-white data-[state=active]:text-blue-600 data-[state=active]:shadow-lg text-white/80 hover:text-white transition-all rounded-xl cursor-pointer"
            tabindex="-1" data-orientation="horizontal" data-radix-collection-item="">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-file-text h-4 w-4">
              <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
              <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
              <path d="M10 9H8"></path>
              <path d="M16 13H8"></path>
              <path d="M16 17H8"></path>
            </svg>
            <span class="hidden sm:inline">History</span>
          </button>
        </div>
      </div>

      <!-- Tab Content Start -->
      <div data-state="active" data-orientation="horizontal" role="tabpanel" aria-labelledby="radix-:r6:-trigger-overview"
        id="radix-:r6:-content-overview" tabindex="0"
        class="mt-2 ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 space-y-6"
        style="animation-duration: 0s;">
        <app-overview-tab [hidden]="activeTab() !== BillingTab.OVERVIEW"></app-overview-tab>
        <app-payment-tab [hidden]="activeTab() !== BillingTab.PAYMENT"></app-payment-tab>
        <app-history-tab [hidden]="activeTab() !== BillingTab.HISTORY"></app-history-tab>
      </div>
      <!-- Tab Content End -->

    </div>
  </div>
</div>
