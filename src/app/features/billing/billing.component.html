<div class="billing-page">
  <app-billing-page-header
    [activeTab]="activeTab()"
    [currentPlanLabel]="planHeadline()"
    [nextRenewalLabel]="renewalHeadline()"
    (tabChange)="setActiveTab($event)" />
  <div class="billing-page__container">
    @if (activeTab() === BillingTab.OVERVIEW) {
      <app-overview-tab />
    }
@if (activeTab() === BillingTab.HISTORY) {
      <app-history-tab />
    }
  </div>
</div>
