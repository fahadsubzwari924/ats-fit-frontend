<div class="billing-stack">
  <div class="billing-grid">
    <app-billing-current-plan-card
      [planLabel]="currentPlanLabel()"
      [showPremiumSkin]="!!userState.currentUser()?.isPremium"
      [priceMain]="priceMain()"
      [pricePeriod]="pricePeriod()"
      [renewSummary]="renewSummary()"
      [daysRemainingLabel]="daysRemainingLabel()"
      [renewalProgressPct]="renewalProgressPct()"
      [features]="currentPlanFeatures()"
      [autoRenewNote]="autoRenewNote()"
      [nextChargeAmount]="nextChargeAmount()"
      (upgradeEnterprise)="onUpgradeEnterprise()"
      (changePlan)="scrollToPlans()"
      (cancelPlan)="scrollToPlans()" />

    <app-billing-usage-overview-panel
      [usages]="usageRows()"
      [resetLabel]="resetLabel()"
      [totalSpent]="totalSpentFormatted()"
      [totalSpentSub]="'all time'"
      [activeSinceValue]="activeSince().value"
      [activeSinceSub]="activeSince().sub" />
  </div>

  <div id="billing-plans" class="billing-section-head">
    <h2 class="billing-section-head__title">Available Plans</h2>
    <p class="billing-section-head__desc">Compare and switch your plan at any time</p>
  </div>
  <div class="billing-grid billing-grid--plans">
    @for (plan of subscriptionPlan(); track plan.id) {
      <app-billing-plan-offer-card
        [plan]="plan"
        [isCurrent]="isCurrentPlan(plan)"
        [accentColor]="planAccent(plan)"
        (selectPlan)="onPlanButtonClick($event)" />
    }
  </div>
</div>
