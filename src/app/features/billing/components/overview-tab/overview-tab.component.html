<div class="rounded-lg bg-card text-card-foreground border-0 shadow-xl bg-gradient-to-br from-white to-blue-50/50">
  <div class="flex flex-col space-y-1.5 p-6">
    <h3 class="font-semibold tracking-tight flex items-center text-xl">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-zap h-6 w-6 text-blue-600 mr-3">
        <path
          d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z">
        </path>
      </svg>Current Usage
    </h3>
  </div>
  <div class="p-6 pt-0">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      @for (item of featureUsage(); track item) {
        <app-current-usage-card [usage]="item"></app-current-usage-card>
      }
    </div>
  </div>
</div>
<div class="rounded-lg bg-card text-card-foreground border-0 shadow-xl bg-gradient-to-br from-white to-purple-50/50 mt-4">
  <div class="flex flex-col space-y-1.5 p-6">
    <h3 class="font-semibold tracking-tight flex items-center text-xl">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-star h-6 w-6 text-purple-600 mr-3">
        <path
          d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z">
        </path>
      </svg>Pricing Plans
    </h3>
  </div>
  <div class="p-6 pt-0">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      @for (plan of subscriptionPlan(); track plan?.id) {
        <app-plan-card
          [plan]="plan"
          [selected]="!!(plan?.id && userSubscribedPlan()?.id && plan?.id === userSubscribedPlan()?.id)"
          (onPlanSelect)="onPlanButtonClick($event)"
        ></app-plan-card>
      }
    </div>
    <!-- <div class="mt-8 p-4 bg-gradient-to-r from-slate-50 to-blue-50 rounded-xl border border-blue-100">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">

  </div>
</div>
