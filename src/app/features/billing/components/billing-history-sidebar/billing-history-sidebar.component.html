<div class="billing-stack billing-stack--sm">
  <div class="billing-cycle-card">
    <h3 class="billing-cycle-card__title">Billing cycle</h3>
    <div class="billing-cycle-card__rows">
      <div class="billing-cycle-card__row">
        <span class="billing-cycle-card__k">Plan</span>
        <span class="billing-cycle-card__v">{{ planLabel() }}</span>
      </div>
      <div class="billing-cycle-card__row">
        <span class="billing-cycle-card__k">Amount</span>
        <span class="billing-cycle-card__v">{{ amountLabel() }}</span>
      </div>
      <div class="billing-cycle-card__row">
        <span class="billing-cycle-card__k">Next charge</span>
        <span class="billing-cycle-card__v">{{ nextCharge() || renewalDateLabel() || '—' }}</span>
      </div>
    </div>
  </div>
</div>
