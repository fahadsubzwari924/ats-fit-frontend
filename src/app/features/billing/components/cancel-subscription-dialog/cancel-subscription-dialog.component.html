<h2 mat-dialog-title>Cancel Subscription</h2>
<mat-dialog-content>
  <p>Are you sure you want to cancel your subscription? You'll lose access to premium features at the end of your billing period.</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="dismiss()">Keep Subscription</button>
  <button mat-raised-button color="warn" (click)="confirm()">Yes, Cancel</button>
</mat-dialog-actions>
