<div class="p-4 bg-gradient-to-r rounded-xl border"
[ngClass]="[getCardIconGradient(usage()?.feature)]"
>
  <div class="flex items-center justify-between">
    <div>
      <p class="text-sm font-medium"
        [ngClass]="getTitleColorClass(usage()?.feature)">{{ getTitle() }}
      </p>
      <p class="text-2xl font-bold"
        [ngClass]="getValueColorClass(usage()?.feature)">{{ usage()?.used }}
      </p>
    </div>
    <div class="text-right">
      <p class="text-xs" [ngClass]="getTitleColorClass(usage()?.feature)">
        of {{ usage()?.allowed }}
      </p>
      <div aria-valuemax="100" aria-valuemin="0" role="progressbar" data-state="indeterminate" data-max="100"
        class="relative overflow-hidden rounded-full bg-secondary w-16 h-2 mt-1">
        <div data-state="indeterminate" data-max="100" class="h-full w-full flex-1 bg-primary transition-all"
          [style.transform]="'translateX(-' + usage()?.usagePercentage + '%)'"></div>
      </div>
    </div>
  </div>
</div>
