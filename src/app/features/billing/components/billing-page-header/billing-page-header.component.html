<div class="billing-page-header">
  <div class="billing-page-header__inner">
    <div>
      <div class="billing-page-header__breadcrumb">
        <a routerLink="/dashboard" class="billing-page-header__crumb">Dashboard</a>
        <span class="billing-page-header__sep">/</span>
        <span class="billing-page-header__crumb--current">Billing</span>
      </div>
      <h1 class="billing-page-header__title">Billing &amp; Subscription</h1>
      <p class="billing-page-header__subtitle">Manage your plan, payment methods, and invoice history</p>
    </div>
    <div class="billing-page-header__meta">
      <div class="billing-page-header__meta-block">
        <p class="billing-page-header__meta-label">Current plan</p>
        <div class="billing-page-header__meta-value-row">
          <svg class="billing-svg-icon billing-svg-icon--md billing-svg-icon--amber" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z" fill="currentColor" />
          </svg>
          <span class="billing-page-header__meta-value">{{ currentPlanLabel() }}</span>
        </div>
      </div>
      <div class="billing-page-header__divider" aria-hidden="true"></div>
      <div class="billing-page-header__meta-block">
        <p class="billing-page-header__meta-label">Next renewal</p>
        <p class="billing-page-header__meta-value">{{ nextRenewalLabel() }}</p>
      </div>
    </div>
  </div>
  <div class="billing-page-header__tabs-wrap">
    <div class="billing-page-header__tabs" role="tablist">
      @for (tab of tabs; track tab.id) {
        <button
          type="button"
          role="tab"
          class="billing-page-header__tab"
          [class.billing-page-header__tab--active]="activeTab() === tab.id"
          [attr.aria-selected]="activeTab() === tab.id"
          (click)="selectTab(tab.id)">
          @switch (tab.id) {
            @case ('overview') {
              <svg class="billing-page-header__tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 3v16a2 2 0 0 0 2 2h16" />
                <path d="M18 17V9" />
                <path d="M13 17V5" />
                <path d="M8 17v-3" />
              </svg>
            }
            @default {
              <svg class="billing-page-header__tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
                <path d="M14 2v4a2 2 0 0 0 2 2h4" />
                <path d="M10 9H8" />
                <path d="M16 13H8" />
                <path d="M16 17H8" />
              </svg>
            }
          }
          {{ tab.label }}
        </button>
      }
    </div>
  </div>
</div>
