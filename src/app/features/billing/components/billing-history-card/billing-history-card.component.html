<div class="flex items-center justify-between p-6 border-b border-slate-100 last:border-b-0 hover:bg-slate-50 transition-colors">
  <div class="flex items-center">
    <div class="w-12 h-12 rounded-xl flex items-center justify-center mr-4"
        [ngClass]="getIconClasses(item().status)">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-dollar-sign h-6 w-6"
          [ngClass]="getIconColor(item().status)">
        <line x1="12" x2="12" y1="2" y2="22"></line>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
    </div>
    <div>
      <div class="flex items-center space-x-3">
        <p class="font-bold text-slate-900 text-lg">{{ item().amount }}</p>
        <div class="inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 border-transparent hover:bg-primary/80"
            [ngClass]="getStatusClasses(item().status)">
          {{ item().status }}
        </div>
      </div>
      <p class="text-slate-600">{{ item().subscriptionPlan?.planName }}</p>
      <p class="text-sm text-slate-500">{{ item().createdAt | date: 'yyyy-MM-dd' }} • Invoice {{ item().id }}</p>
    </div>
  </div>
  <button (click)="onDownloadClick()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg]:size-4 [&amp;_svg]:shrink-0 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-10 px-4 py-2 rounded-xl cursor-pointer">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-download h-4 w-4 mr-2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <polyline points="7 10 12 15 17 10"></polyline>
      <line x1="12" x2="12" y1="15" y2="3"></line>
    </svg>Download
  </button>
</div>
