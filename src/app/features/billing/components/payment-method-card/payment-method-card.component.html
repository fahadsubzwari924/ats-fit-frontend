<div class="p-4 bg-white rounded-xl border border-slate-200 hover:border-blue-300 transition-colors">
  <div class="flex items-center justify-between">
    <div class="flex items-center">
      <div class="w-12 h-8 bg-gradient-to-r rounded-lg flex items-center justify-center mr-4"
          [ngClass]="paymentMethod().iconGradient || getCardIconGradient(paymentMethod().cardType)">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-credit-card h-5 w-5 text-white">
          <rect width="20" height="14" x="2" y="5" rx="2"></rect>
          <line x1="2" x2="22" y1="10" y2="10"></line>
        </svg>
      </div>
      <div>
        <p class="font-semibold text-slate-900">{{ paymentMethod().cardNumber }}</p>
        <p class="text-sm text-slate-600">Expires {{ paymentMethod().expiryDate }}</p>
      </div>
      @if (paymentMethod().cardHolderName) {
        <div class="inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 border-transparent hover:bg-primary/80 ml-3 bg-success-softer text-success-strong">
          Default
        </div>
      }
    </div>
    <div class="flex items-center space-x-2">
      @if (!paymentMethod().isDefault) {
        <button class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg]:size-4 [&amp;_svg]:shrink-0 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 rounded-md px-3 text-xs cursor-pointer"
          (click)="onSetAsDefault()">
          Set Default
        </button>
      }
      <button
          class="inline-flex items-center justify-center gap-2 whitespace-nowrap text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg]:size-4 [&amp;_svg]:shrink-0 border border-input bg-background h-9 rounded-md px-3 text-red-600 hover:text-red-700 hover:bg-red-50 cursor-pointer"
          (click)="onDeletePaymentMethod()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-trash2 h-4 w-4">
          <path d="M3 6h18"></path>
          <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
          <line x1="10" x2="10" y1="11" y2="17"></line>
          <line x1="14" x2="14" y1="11" y2="17"></line>
        </svg>
      </button>
    </div>
  </div>
</div>
