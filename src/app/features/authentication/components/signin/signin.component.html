<div
  class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 flex items-center justify-center px-4"
>
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a class="inline-flex items-center space-x-2" href="/"
        ><div
          class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-file-text h-6 w-6 text-white"
          >
            <path
              d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"
            ></path>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
            <path d="M10 9H8"></path>
            <path d="M16 13H8"></path>
            <path d="M16 17H8"></path>
          </svg>
        </div>
        <span class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
          ATS Fit
        </span>
      </a>
    </div>
    <div class="rounded-lg bg-card text-card-foreground shadow-xl border-0">
      <div class="flex flex-col space-y-1.5 p-6 text-center">
        <h3 class="tracking-tight text-2xl font-bold">Welcome Back</h3>
        <p class="text-sm text-muted-foreground">
          Sign in to your account to continue optimizing your resume
        </p>
      </div>
      <div class="p-6 pt-0 space-y-6">
        <form [formGroup]="signinForm" class="space-y-4">
          <div class="space-y-2">
            <app-input-field
              formControlName="email"
              id="email"
              label="Email"
              type="email"
              placeholder="Enter your email"
              [required]="true"
            >
            </app-input-field>
          </div>
          <div class="space-y-2">
            <div class="relative">
              <app-input-field
              formControlName="password"
              id="password"
              label="Password"
              [type]="passwordFieldType()"
              placeholder="Enter your password"
              [required]="true"
            >
            </app-input-field>

              <button
                (click)="togglePasswordVisibility()"
                type="button"
                class="absolute right-3 top-10 transform cursor-pointer"
              >
                <mat-icon class="h-4 w-4 text-slate-400">{{passwordFieldType() === InputType.PASSWORD ? 'visibility' : 'visibility_off'}}</mat-icon>
              </button>
            </div>
          </div>

          <app-button
            [fullWidth]="true"
            text="Sign In"
            type="submit"
            (onClick)="login()"
          >
          </app-button>
        </form>
        <div class="relative">
          <app-google-auth-button></app-google-auth-button>
        </div>
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <span class="w-full border-t border-slate-200"></span>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-white px-2 text-slate-500">Or</span>
          </div>
        </div>
        <app-button
          text="Continue as Guest"
          variant="outline"
          [fullWidth]="true"
          customClass="mb-3"
        >
        </app-button>

        <div class="text-center space-y-2">
          <p class="text-sm text-slate-600">
            Don't have an account?
            <a
              class="text-blue-600 hover:text-blue-700 font-medium cursor-pointer"
              [routerLink]="'/signup'"
              >Sign up for free</a
            >
          </p>
          <p class="text-xs text-slate-500">
            <a [routerLink]="'/forgot-password'" class="hover:text-slate-700 cursor-pointer"
              >Forgot your password?</a
            >
          </p>
        </div>
      </div>
    </div>
    <div class="text-center mt-6">
      <a
        class="text-sm text-slate-600 hover:text-slate-800 transition-colors cursor-pointer"
        href="/"
        >← Back to home</a
      >
    </div>
  </div>
</div>
