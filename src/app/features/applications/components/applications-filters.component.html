<div
  class="rounded-2xl border border-[#E2E8F0] bg-white p-4 shadow-sm"
  style="box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04)"
  role="search"
  aria-label="Filter applications"
>
  <div class="flex flex-col gap-3 border-b border-[#F1F5F9] pb-3 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h2 class="text-sm font-semibold text-slate-900">Filters</h2>
      <p class="mt-0.5 text-xs text-slate-500">Filters apply automatically as you type or change options.</p>
    </div>
    <button
      type="button"
      class="shrink-0 rounded-xl border-2 border-[var(--ats-primary)] bg-[var(--ats-primary)] px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-[var(--ats-primary)] focus:ring-offset-2 disabled:pointer-events-none disabled:opacity-40"
      [disabled]="!hasActiveFilters()"
      (click)="onClear()"
    >
      Clear filters
    </button>
  </div>

  <div class="mt-2 md:hidden">
    <button
      type="button"
      id="applications-filters-mobile-toggle"
      class="flex w-full items-center justify-between gap-2 rounded-xl border border-[#E2E8F0] bg-[#F8FAFC] px-3 py-2.5 text-left text-sm font-medium text-slate-800 transition hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-[var(--ats-primary)] focus:ring-offset-2"
      [attr.aria-expanded]="showFiltersPanel()"
      aria-controls="applications-filters-panel"
      (click)="toggleMobileFilters()"
    >
      <span class="min-w-0">
        {{ mobileFiltersExpanded() ? 'Hide filters' : 'Show all filters' }}
        @if (!mobileFiltersExpanded() && hasActiveFilters()) {
          <span class="mt-0.5 block text-xs font-normal text-slate-500">Some filters are active</span>
        }
      </span>
      <svg
        class="h-5 w-5 shrink-0 text-slate-500 transition-transform"
        [class.rotate-180]="mobileFiltersExpanded()"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>
  </div>

  <div
    id="applications-filters-panel"
    class="md:block"
    [class.hidden]="!showFiltersPanel()"
    [attr.aria-hidden]="showFiltersPanel() ? null : true"
  >
    <div class="mt-3 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-4 lg:items-end">
      <div class="min-w-0 sm:col-span-2 lg:col-span-1">
        <label class="mb-1 block text-xs font-medium text-slate-700" for="applications-search">Search</label>
        <input
          id="applications-search"
          type="search"
          class="apps-field h-10 w-full rounded-xl border border-[#E2E8F0] bg-white px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 focus:border-[var(--ats-primary-lightest)] focus:outline-none focus:ring-2 focus:ring-[var(--ats-primary)] focus:ring-offset-0"
          [(ngModel)]="searchQuery"
          autocomplete="off"
          placeholder="Company or role"
        />
      </div>

      <div class="min-w-0">
        <label class="mb-1 block text-xs font-medium text-slate-700" for="applied-from">Applied from</label>
        <input
          id="applied-from"
          type="date"
          class="apps-field h-10 w-full rounded-xl border border-[#E2E8F0] bg-white px-3 py-2 text-sm text-slate-900 focus:border-[var(--ats-primary-lightest)] focus:outline-none focus:ring-2 focus:ring-[var(--ats-primary)]"
          [(ngModel)]="appliedFrom"
        />
      </div>

      <div class="min-w-0">
        <label class="mb-1 block text-xs font-medium text-slate-700" for="applied-to">Applied to</label>
        <input
          id="applied-to"
          type="date"
          class="apps-field h-10 w-full rounded-xl border border-[#E2E8F0] bg-white px-3 py-2 text-sm text-slate-900 focus:border-[var(--ats-primary-lightest)] focus:outline-none focus:ring-2 focus:ring-[var(--ats-primary)]"
          [(ngModel)]="appliedTo"
        />
      </div>

      <div class="min-w-0">
        <label class="mb-1 block text-xs font-medium text-slate-700" for="filter-priority">Priority</label>
        <select
          id="filter-priority"
          class="apps-field h-10 w-full rounded-xl border border-[#E2E8F0] bg-white px-3 py-2 text-sm text-slate-900 focus:border-[var(--ats-primary-lightest)] focus:outline-none focus:ring-2 focus:ring-[var(--ats-primary)]"
          [(ngModel)]="filterPriority"
        >
          <option value="">All priorities</option>
          <option value="top_choice">Top choice</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>

      <div class="min-w-0">
        <label class="mb-1 block text-xs font-medium text-slate-700" for="filter-work-mode">Work mode</label>
        <select
          id="filter-work-mode"
          class="apps-field h-10 w-full rounded-xl border border-[#E2E8F0] bg-white px-3 py-2 text-sm text-slate-900 focus:border-[var(--ats-primary-lightest)] focus:outline-none focus:ring-2 focus:ring-[var(--ats-primary)]"
          [(ngModel)]="filterWorkMode"
        >
          <option value="">All modes</option>
          <option value="remote">Remote</option>
          <option value="hybrid">Hybrid</option>
          <option value="on_site">On-site</option>
        </select>
      </div>

      <div class="min-w-0">
        <label class="mb-1 block text-xs font-medium text-slate-700" for="filter-employment-type">Type</label>
        <select
          id="filter-employment-type"
          class="apps-field h-10 w-full rounded-xl border border-[#E2E8F0] bg-white px-3 py-2 text-sm text-slate-900 focus:border-[var(--ats-primary-lightest)] focus:outline-none focus:ring-2 focus:ring-[var(--ats-primary)]"
          [(ngModel)]="filterEmploymentType"
        >
          <option value="">All types</option>
          <option value="full_time">Full-time</option>
          <option value="part_time">Part-time</option>
          <option value="contract">Contract</option>
          <option value="freelance">Freelance</option>
          <option value="internship">Internship</option>
        </select>
      </div>

      <div #statusDropdown class="relative min-w-0 sm:col-span-2 lg:col-span-1">
        <label class="mb-1 block text-xs font-medium text-slate-700" for="applications-status-trigger">Status</label>
        <button
          type="button"
          id="applications-status-trigger"
          class="apps-field flex h-10 w-full items-center justify-between gap-2 rounded-xl border border-[#E2E8F0] bg-white px-3 text-left text-sm text-slate-900 shadow-sm transition hover:border-slate-300 focus:border-[var(--ats-primary-lightest)] focus:outline-none focus:ring-2 focus:ring-[var(--ats-primary)] focus:ring-offset-0"
          [attr.aria-expanded]="statusPanelOpen()"
          aria-haspopup="listbox"
          aria-controls="applications-status-panel"
          (click)="toggleStatusPanel(); $event.stopPropagation()"
        >
          <span class="min-w-0 truncate text-slate-800">{{ statusTriggerSummary() }}</span>
          <svg
            class="h-4 w-4 shrink-0 text-slate-500 transition-transform"
            [class.rotate-180]="statusPanelOpen()"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
            aria-hidden="true"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>

        @if (statusPanelOpen()) {
          <div
            id="applications-status-panel"
            role="listbox"
            [attr.aria-multiselectable]="true"
            class="absolute left-0 right-0 z-50 mt-1 max-h-64 overflow-y-auto rounded-xl border border-[#E2E8F0] bg-white py-2 shadow-[0_10px_40px_-10px_rgba(15,23,42,0.2)]"
          >
            <div class="border-b border-[#F1F5F9] px-3 pb-2">
              <p class="text-[10px] font-semibold uppercase tracking-wider text-slate-400">In pipeline</p>
              <div class="mt-1.5 space-y-0.5">
                @for (st of pipelineStatuses; track st) {
                  <label
                    class="flex cursor-pointer items-center gap-2.5 rounded-lg px-2 py-1.5 text-sm text-slate-800 transition hover:bg-slate-50"
                  >
                    <input
                      type="checkbox"
                      class="h-4 w-4 shrink-0 rounded border-[#E2E8F0] text-[var(--ats-primary)] focus:ring-[var(--ats-primary)]"
                      [checked]="isChecked(st)"
                      (change)="toggleStatus(st)"
                      [attr.aria-label]="'Filter by status ' + (statusLabel(st) | titlecase)"
                    />
                    <span>{{ statusLabel(st) | titlecase }}</span>
                  </label>
                }
              </div>
            </div>
            <div class="px-3 pt-2">
              <p class="text-[10px] font-semibold uppercase tracking-wider text-slate-400">Outcome</p>
              <div class="mt-1.5 space-y-0.5">
                @for (st of outcomeStatuses; track st) {
                  <label
                    class="flex cursor-pointer items-center gap-2.5 rounded-lg px-2 py-1.5 text-sm text-slate-800 transition hover:bg-slate-50"
                  >
                    <input
                      type="checkbox"
                      class="h-4 w-4 shrink-0 rounded border-[#E2E8F0] text-[var(--ats-primary)] focus:ring-[var(--ats-primary)]"
                      [checked]="isChecked(st)"
                      (change)="toggleStatus(st)"
                      [attr.aria-label]="'Filter by status ' + (statusLabel(st) | titlecase)"
                    />
                    <span>{{ statusLabel(st) | titlecase }}</span>
                  </label>
                }
              </div>
            </div>
            <p class="border-t border-[#F1F5F9] px-3 pb-1 pt-2 text-[11px] leading-snug text-slate-500">
              Leave empty for all statuses. Click outside to close.
            </p>
          </div>
        }
      </div>
    </div>
  </div>
</div>
