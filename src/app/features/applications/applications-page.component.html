<div class="applications-page min-h-screen bg-[#F8FAFC]">
  <div class="mx-auto max-w-[1280px] px-6 py-7">
    <div class="mb-8 flex flex-wrap items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Applications</h1>
        <p class="mt-1 text-sm text-slate-600">Track and manage your job applications in one place.</p>
      </div>
      <button
        type="button"
        class="rounded-xl bg-[var(--ats-primary)] px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-[var(--ats-primary-dark)] focus:outline-none focus:ring-2 focus:ring-[var(--ats-primary)] focus:ring-offset-2"
        (click)="onAddApplication()"
      >
        Add application
      </button>
    </div>

    <div class="flex flex-col gap-5">
      <app-applications-stats-strip [stats]="stats()" />

      <app-applications-filters
        [(searchQuery)]="filterSearch"
        [(selectedStatuses)]="filterStatuses"
        [(appliedFrom)]="filterAppliedFrom"
        [(appliedTo)]="filterAppliedTo"
        [(filterPriority)]="filterPriority"
        [(filterWorkMode)]="filterWorkMode"
        [(filterEmploymentType)]="filterEmploymentType"
      />

      @if (selectedJobId(); as detailId) {
        <app-application-detail-drawer
          [jobId]="detailId"
          (closed)="onCloseDetailDrawer()"
          (saved)="onDetailSaved()"
        />
      }

      <app-applications-table
        [rows]="listResult()?.applications ?? []"
        [isLoading]="loading()"
        [total]="listResult()?.total ?? 0"
        [offset]="offset()"
        [limit]="20"
        [sortBy]="sortBy()"
        [sortOrder]="sortOrder()"
        [statusUpdatingJobId]="statusUpdatingJobId()"
        (sortCompany)="onSortCompany()"
        (sortUpdated)="onSortUpdated()"
        (pagePrev)="onPagePrev()"
        (pageNext)="onPageNext()"
        (viewJob)="onViewJob($event)"
        (deleteJob)="onDeleteJob($event)"
        (adjustFilters)="onAdjustFilters()"
        (statusChange)="onStatusChange($event)"
      />
    </div>
  </div>
</div>
