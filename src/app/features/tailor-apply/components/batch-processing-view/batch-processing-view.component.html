<div class="space-y-5">

  @if (connectionStatus()() === 'reconnecting') {
    <div class="flex items-center gap-2 px-4 py-2 rounded-xl bg-amber-50 border border-amber-200 text-amber-800 text-sm" role="alert">
      <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
      </svg>
      Reconnecting…
    </div>
  }

  <div class="flex flex-col items-center gap-3 text-center">
    <div>
      <h3 class="text-xl font-bold text-slate-900">Tailoring Your Resumes</h3>
      <p class="text-xs text-slate-500 mt-1" role="status" aria-live="polite">
        {{ state().completedCount() }} of {{ state().totalCount() }} complete
        @if (etaSeconds() > 0) {
          · ~{{ etaSeconds() }}s remaining
        }
      </p>
    </div>

    <div
      class="w-full bg-slate-100 rounded-full h-2 overflow-hidden"
      role="progressbar"
      [attr.aria-valuenow]="state().progressPct()"
      aria-valuemin="0"
      aria-valuemax="100">
      <div
        class="h-full bg-gradient-to-r from-accent-purple to-primary transition-all duration-500 ease-out"
        [style.width.%]="state().progressPct()">
      </div>
    </div>
  </div>

  <!--
    `flex flex-col gap-4` instead of `space-y-4`.
    `<app-batch-job-card>` Angular host element defaults to `display: inline`
    (no custom host binding sets otherwise). Tailwind `space-y-*` emits
    `margin-top` on siblings, but margin-top is silently dropped on inline
    boxes — which is why every gap value (2/3/4) looked the same visually.
    Flex `gap-*` operates on the layout container, so it works regardless
    of child display mode. 16px (gap-4) keeps the cards visually distinct
    against the light slate-200 border on each card.
  -->
  <div class="flex flex-col gap-4">
    @for (job of state().snapshot()?.jobs ?? []; track job.index) {
      <app-batch-job-card
        [job]="job"
        [retryingJobIds]="retryingJobIds()"
        (download)="download.emit($event)"
        (seeChanges)="seeChanges.emit($event)"
        (retry)="retry.emit($event)" />
    }
  </div>

</div>
