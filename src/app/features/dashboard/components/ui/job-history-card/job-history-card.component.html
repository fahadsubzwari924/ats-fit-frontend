  <div class="bg-gradient-to-br from-slate-50 to-blue-50 rounded-xl p-6 border border-slate-200 hover:shadow-md transition-all duration-200 mb-3">
    <div class="flex flex-col lg:flex-row lg:items-center justify-between space-y-4 lg:space-y-0">
      <div class="flex-1 space-y-3">
        <div class="flex items-start space-x-4">
          <div class="p-2 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building2 h-5 w-5 text-white">
              <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path>
              <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
              <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path>
              <path d="M10 6h4"></path>
              <path d="M10 10h4"></path>
              <path d="M10 14h4"></path>
              <path d="M10 18h4"></path>
            </svg>
          </div>
          <div class="flex-1">
            <h4 class="font-bold text-slate-900 text-lg">{{jobHistory()?.jobPosition}}</h4>
            <p class="text-slate-600 font-medium">{{jobHistory()?.companyName}}</p>
            <div class="flex items-center space-x-4 mt-2 text-sm text-slate-500">
              <div class="flex items-center space-x-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" class="lucide lucide-calendar h-4 w-4">
                  <path d="M8 2v4"></path>
                  <path d="M16 2v4"></path>
                  <rect width="18" height="18" x="3" y="4" rx="2"></rect>
                  <path d="M3 10h18"></path>
                </svg>
                <span>{{jobHistory()?.appliedAt| date: 'shortDate'}}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="flex items-center space-x-6">
        <div class="text-center">
          <div class="text-sm font-medium text-slate-600 mb-2">Status</div>
          <select
            [(ngModel)]="selectedStatus"
            (ngModelChange)="onStatusChange()"
            class="flex h-10 items-center justify-between rounded-md px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 [&amp;&gt;span]:line-clamp-1 w-[160px] border-2"
            [ngClass]="getStatusColor(selectedStatus() ?? '')"
          >
            @for (status of applicationStatuses; track status) {
              <option
                [value]="status"
                [selected]="status === jobHistory()?.status">
                {{status | titlecase}}
              </option>
            }
          </select>
