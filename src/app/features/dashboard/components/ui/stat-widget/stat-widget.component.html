<div class="bg-gradient-to-br from-slate-50 to-blue-50 rounded-xl p-4 border border-slate-200">
  <div class="flex items-center justify-between mb-2">
    <div class="flex items-center space-x-2">
      <div class="text-blue-600 p-1.5 bg-white rounded-lg shadow-sm">
        @if (icon()) {
          <div [innerHTML]="icon()" class="text-sm font-medium text-slate-700"></div>
        }
      </div>
      <span class="text-sm font-medium text-slate-700">{{title()}}</span>
    </div>
    <div class="text-lg font-bold text-slate-900">{{featureUsage()?.used}}/{{featureUsage()?.allowed}}</div>
  </div>
  <div aria-valuemax="100" aria-valuemin="0" role="progressbar"
    class="relative w-full overflow-hidden rounded-full bg-secondary mb-2 h-2">
    <div class="h-full w-full flex-1 bg-primary transition-all" style="transform: translateX(-{{featureUsage()?.usagePercentage}});"></div>
  </div>
  <p class="text-xs text-slate-500">{{featureUsage()?.usagePercentage}} of monthly limit used</p>
</div>
