<div class="bg-gradient-to-br from-slate-50 to-blue-50 rounded-xl p-4 border border-slate-200">
  <div class="flex items-center justify-between mb-3">
    <div class="flex items-center space-x-2">
      <div class="text-blue-600 p-1.5 bg-white rounded-lg shadow-sm">
        @if (icon()) {
          <div [innerHTML]="icon()" class="text-sm font-medium text-slate-700"></div>
        }
      </div>
      <span class="text-sm font-medium text-slate-700">{{title()}}</span>
    </div>
    <div class="text-right">
      <div class="text-lg font-bold text-slate-900 leading-none">{{ remaining() }}</div>
      <div class="text-xs text-slate-500 mt-0.5">remaining</div>
    </div>
  </div>
  <div aria-valuemax="100" aria-valuemin="0" role="progressbar"
    class="relative w-full overflow-hidden rounded-full bg-slate-200 mb-2 h-2">
    <div class="h-full bg-gradient-to-r from-blue-500 to-cyan-500 rounded-full transition-all"
      [style.width]="featureUsage()?.usagePercentage || '0%'"></div>
  </div>
  <p class="text-xs text-slate-500">
    {{ featureUsage()?.used ?? 0 }} of {{ featureUsage()?.allowed ?? 0 }} used this month
  </p>
</div>
