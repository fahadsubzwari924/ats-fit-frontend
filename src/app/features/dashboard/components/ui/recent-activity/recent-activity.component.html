<div class="bg-gradient-to-br from-slate-50 to-blue-50 rounded-xl p-4 border border-slate-200 hover:shadow-md transition-all duration-200 mb-3">
  <div class="flex items-center justify-between">
    <div class="flex items-center space-x-3 flex-1">
      <div class="p-2 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg">
      <!-- <img src="{{activity()?.icon}}" alt=""> -->

        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building2 h-4 w-4 text-white">
          <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path>
          <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path>
          <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path>
          <path d="M10 6h4"></path>
          <path d="M10 10h4"></path>
          <path d="M10 14h4"></path>
          <path d="M10 18h4"></path>
        </svg>
      </div>
      <div class="flex-1">
        <h4 class="font-semibold text-slate-900 text-sm">{{activity()?.jobPosition || 'Unknown Position'}}</h4>
        <p class="text-slate-600 text-sm">{{activity()?.jobDescription}}</p>
        <div class="flex items-center space-x-3 mt-1 text-xs text-slate-500">
          <div class="flex items-center space-x-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" class="lucide lucide-clock h-3 w-3">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Checked {{activity()?.createdAt | date: 'shortDate'}}</span>
          </div>
          @if (activity()?.atsScore) {
            <div class="inline-flex items-center rounded-full border px-2.5 py-0.5 font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2 hover:bg-primary/80 bg-blue-100 text-blue-700 border-blue-200 text-xs">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-target h-3 w-3 mr-1">
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="12" cy="12" r="6"></circle>
                <circle cx="12" cy="12" r="2"></circle>
              </svg>
              ATS Checked
            </div>
          }

        </div>
      </div>
    </div>
    <div class="text-center">
      <div class="flex items-center space-x-1 mb-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" class="lucide lucide-target h-3 w-3 text-slate-500">
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="12" cy="12" r="6"></circle>
          <circle cx="12" cy="12" r="2"></circle>
        </svg>
        <span class="text-xs font-medium text-slate-600">Score</span>
      </div>
      <div class="text-lg font-bold text-yellow-600">{{activity()?.atsScore}}</div>
    </div>
  </div>
</div>
