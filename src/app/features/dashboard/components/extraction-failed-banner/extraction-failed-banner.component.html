<div class="flex items-center gap-3 rounded-lg border border-red-200 bg-red-50 px-4 py-3 mb-4 text-sm text-red-800">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0" aria-hidden="true">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  <span class="flex-1">{{ copy.replacementFailed }}</span>
  <div class="flex items-center gap-2">
    <button
      type="button"
      (click)="tryAgain()"
      class="inline-flex items-center justify-center gap-1.5 whitespace-nowrap rounded-lg text-xs font-semibold h-8 px-3 bg-red-600 hover:bg-red-700 text-white transition-colors">
      {{ copy.tryAgain }}
    </button>
    @if (lastArchivedExtractId()) {
      <button
        type="button"
        (click)="restorePrevious()"
        class="inline-flex items-center justify-center gap-1.5 whitespace-nowrap rounded-lg text-xs font-semibold h-8 px-3 border border-red-200 text-red-700 hover:bg-red-100 transition-colors">
        {{ copy.restorePrevious }}
      </button>
    }
  </div>
</div>
