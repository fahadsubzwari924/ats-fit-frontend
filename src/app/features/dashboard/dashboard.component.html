<div class="min-h-screen bg-[#F8FAFC]">
  <app-dashboard-hero
    [userName]="user?.fullName"
    [resumeCount]="resumeHistory().length"
    [atsCreditsRemaining]="atsCreditsRemaining()"
    (tailorClicked)="openTailorModal()"
    (quickTailorClicked)="openBatchTailoringModal()"
    (resumeHistoryClicked)="openResumeHistoryModal()">
  </app-dashboard-hero>

  <app-questions-banner [visible]="showQuestionsBanner" (answerClicked)="onScrollToQuestions()">
  </app-questions-banner>

  <div class="max-w-[1280px] mx-auto px-6 py-7">
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-6">
      <div class="space-y-5">
        <div id="dashboard-profile" class="app-dashboard-anchor">
          <app-resume-profile-card
            (uploadRequested)="onProfileUploadRequested($event)"
            (scrollToQuestions)="onScrollToQuestions()"
            (retryRequested)="onRetryProcessing()">
          </app-resume-profile-card>
        </div>

        <app-resume-history-card
          [items]="resumeHistory()"
          [loading]="resumeHistoryLoading()"
          [downloadingId]="downloadingId()"
          (viewAllClicked)="openResumeHistoryModal()"
          (createFirstClicked)="openTailorModal()"
          (downloadItem)="downloadHistoryItem($event)">
        </app-resume-history-card>

        @if (user?.isPremium) {
          <app-tailore-resume-upload></app-tailore-resume-upload>
        }

        @if (user?.isPremium && jobHistory()?.applications?.length) {
          <app-job-applications-card
            [applications]="jobHistory()!.applications!"
            (jobStatusChange)="onJobStatusChange($event)">
          </app-job-applications-card>
        }
      </div>

      <div class="space-y-5">
        <div id="dashboard-usage" class="app-dashboard-anchor">
          <app-dashboard-usage-card [featureUsages]="featureUsage()"></app-dashboard-usage-card>
        </div>
        <div id="dashboard-settings" class="app-dashboard-anchor">
          <app-dashboard-tips-card></app-dashboard-tips-card>
        </div>
      </div>
    </div>
  </div>
</div>

<app-questions-drawer [open]="drawerOpen()" (closed)="onDrawerClosed()"></app-questions-drawer>
