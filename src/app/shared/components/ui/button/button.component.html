<button
  [type]="type"
  [ngClass]="computedClasses"
  [disabled]="disabled || loading"
  [attr.aria-busy]="loading ? true : null"
  (click)="handleClick()">

  @if (loading) {
    @if (loadingIndicator === 'dots') {
      <span class="app-btn-loading-dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </span>
    } @else {
      <svg class="animate-spin h-4 w-4 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
        </path>
      </svg>
    }
  }

  @if (!loading && icon && iconAlign === 'left') {
    <span [innerHTML]="getIconSvg()"></span>
  }

  <ng-content></ng-content>

  @if (buttonText) {
    <span>{{ buttonText }}</span>
  }

  @if (!loading && icon && iconAlign === 'right') {
    <span [innerHTML]="getIconSvg()"></span>
  }

</button>
