<button
  [type]="type()"
  [class]="buttonClasses"
  [disabled]="isDisabled"
  [attr.aria-label]="ariaLabel || text"
  (click)="handleClick($event)">

  <!-- Left Icon -->
  @if (hasLeftIcon && !loading()) {
    <!-- External Image -->
    @if (isExternalImage) {
      <img
        [src]="icon()"
        alt="Icon"
        [class]="iconClass()"
        loading="lazy">
    }
    <!-- SVG Content -->
    @else if (iconType() === IconType.SVG) {
      <div [innerHTML]="getIconContent"></div>
    }
    <!-- Material Icon -->
    @else if (iconType() === IconType.MATERIAL) {
      <span [class]="iconClass() + ' material-icons'">{{ getIconContent }}</span>
    }
  }

  <!-- Loading Spinner -->
  @if (loading()) {
    <svg [class]="iconClass + ' animate-spin'" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  }

  <!-- Button Text -->
  @if (text()) {
    <span>{{ text() }}</span>
  }

  <!-- Content Projection for custom content -->
  <ng-content></ng-content>

  <!-- Right Icon -->
  @if (hasRightIcon && !loading()) {
    <!-- External Image -->
    @if (isExternalImage) {
      <img
        [src]="icon()"
        alt="Icon"
        [class]="iconClass()"
        loading="lazy">
    }
    <!-- SVG Content -->
    @else if (iconType() === IconType.SVG) {
      <div [innerHTML]="getIconContent"></div>
    }
    <!-- Material Icon -->
    @else if (iconType() === IconType.MATERIAL) {
      <span [class]="iconClass() + ' material-icons'">{{ getIconContent }}</span>
    }
  }
</button>
