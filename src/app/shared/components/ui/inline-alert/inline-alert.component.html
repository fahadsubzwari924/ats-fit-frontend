@if (message()) {
  <div [class]="containerClasses()" role="alert" aria-live="polite">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5 flex-shrink-0"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="1.5"
    >
      <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="iconPath()" />
    </svg>
    <span>{{ message() }}</span>
  </div>
}
