<div
  class="relative overflow-hidden"
  style="background: linear-gradient(135deg, #1E3A8A 0%, #1D4ED8 50%, #2563EB 100%)">
  <div
    class="absolute inset-0"
    style="background-image: radial-gradient(circle at 80% 50%, rgba(99,102,241,0.25) 0%, transparent 60%), radial-gradient(circle at 10% 80%, rgba(14,165,233,0.2) 0%, transparent 50%)">
  </div>

  <div class="max-w-[1280px] mx-auto px-6 py-8 relative">
    <div class="flex items-center justify-between">
      <div>
        <p
          class="text-[#93C5FD] text-[12px] font-medium mb-1 uppercase"
          style="letter-spacing: 0.08em">
          Welcome back
        </p>
        <h1 class="text-[26px] font-bold text-white tracking-tight leading-tight">
          {{ displayName() }}
        </h1>
        <p class="text-[#BFDBFE] text-[13.5px] mt-1">
          Ready to land your next role? Let's tailor your resume.
        </p>
      </div>

      <div class="flex items-center gap-3">
        @for (stat of heroStats(); track stat.label) {
          <div
            class="text-center px-4 py-3 rounded-xl"
            style="background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2)">
            <p class="text-white text-[22px] font-bold leading-none">{{ stat.value }}</p>
            <p class="text-[#93C5FD] text-[11px] mt-0.5">{{ stat.label }}</p>
          </div>
        }
      </div>
    </div>

    <div class="grid grid-cols-3 gap-4 mt-6">
      <button
        type="button"
        (click)="tailorClicked.emit()"
        class="group flex items-center gap-3 rounded-xl px-5 py-4 text-left transition-all duration-200 hero-cta-btn">
        <div
          class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 text-white"
          style="background: rgba(255,255,255,0.15)">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="text-white">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
            <path d="M10 9H8"></path>
            <path d="M16 13H8"></path>
            <path d="M16 17H8"></path>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-white font-semibold text-[13.5px]">Tailor Resume</p>
          <p class="text-[#93C5FD] text-[12px] mt-0.5">Optimize for a single job</p>
        </div>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          class="text-white/50 group-hover:text-white/80 transition-colors flex-shrink-0">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </button>

      <button
        type="button"
        (click)="quickTailorClicked.emit()"
        class="group flex items-center gap-3 rounded-xl px-5 py-4 text-left transition-all duration-200 hero-cta-btn">
        <div
          class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 text-white"
          style="background: rgba(255,255,255,0.15)">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="text-white">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <p class="text-white font-semibold text-[13.5px]">Quick Tailor</p>
            <span
              class="px-1.5 py-0.5 bg-[#F59E0B] text-[#78350F] text-[9.5px] font-bold rounded uppercase"
              style="letter-spacing: 0.05em">
              Pro
            </span>
          </div>
          <p class="text-[#93C5FD] text-[12px] mt-0.5">Multiple jobs at once</p>
        </div>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          class="text-white/50 group-hover:text-white/80 transition-colors flex-shrink-0">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </button>

      <button
        type="button"
        (click)="resumeHistoryClicked.emit()"
        class="group flex items-center gap-3 rounded-xl px-5 py-4 text-left transition-all duration-200 hero-cta-btn">
        <div
          class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 text-white"
          style="background: rgba(255,255,255,0.15)">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="text-white">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-white font-semibold text-[13.5px]">My Resumes</p>
          <p class="text-[#93C5FD] text-[12px] mt-0.5">
            @if (resumeCount()) {
              {{ resumeCount() }} saved version{{ resumeCount() !== 1 ? 's' : '' }}
            } @else {
              View history
            }
          </p>
        </div>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          class="text-white/50 group-hover:text-white/80 transition-colors flex-shrink-0">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </button>
    </div>
  </div>
</div>
