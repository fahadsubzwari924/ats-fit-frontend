# Cloud Build configuration for automated deployment to Cloud Run
# This file defines the build and deployment pipeline for the Angular SSR application

# Substitutions for configuration (can be overridden via gcloud command)
substitutions:
  _SERVICE_NAME: resume-maker-fe
  _REGION: asia-south1
  _MEMORY: 1Gi
  _CPU: "1"
  _MAX_INSTANCES: "100"
  _MIN_INSTANCES: "0"
  _CONCURRENCY: "80"
  _TIMEOUT: "300s"
  _PLATFORM: managed
  _IMAGE_TAG: $SHORT_SHA # Will fall back to BUILD_ID if SHORT_SHA is not available

options:
  # Use higher CPU machine for faster builds
  machineType: "N1_HIGHCPU_8"

  # Use Kaniko cache for faster Docker builds
  substitutionOption: "ALLOW_LOOSE"

  # Logging configuration
  logging: CLOUD_LOGGING_ONLY

  # Dynamic substitutions
  dynamicSubstitutions: true

# Build steps
steps:
  # Step 1: Build the Docker image using Cloud Build
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest"
      - "--cache-from"
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest"
      - "--build-arg"
      - "BUILDKIT_INLINE_CACHE=1"
      - "."
    timeout: "1200s"

  # Step 2: Push the Docker image to Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID"
    waitFor:
      - "build-image"

  # Step 3: Push the latest tag
  - name: "gcr.io/cloud-builders/docker"
    id: "push-latest"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest"
    waitFor:
      - "build-image"

  # Step 4: Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    id: "deploy-cloud-run"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID"
      - "--region=${_REGION}"
      - "--platform=${_PLATFORM}"
      - "--memory=${_MEMORY}"
      - "--cpu=${_CPU}"
      - "--timeout=${_TIMEOUT}"
      - "--max-instances=${_MAX_INSTANCES}"
      - "--min-instances=${_MIN_INSTANCES}"
      - "--concurrency=${_CONCURRENCY}"
      - "--port=8080"
      - "--allow-unauthenticated"
      - "--set-env-vars=NODE_ENV=production"
      - "--execution-environment=gen2"
      - "--cpu-boost"
      - "--session-affinity"
    waitFor:
      - "push-image"

# Images to be pushed to Container Registry
images:
  - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID"
  - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest"

# Timeout for the entire build
timeout: "1800s"

# Tags for organizing builds
tags:
  - "resume-maker-fe"
  - "angular-ssr"
  - "cloud-run"
